<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#EA580C">
    <meta name="mobile-web-app-capable" content="yes">
    <title>MentraRestaurant Lite | نظام إدارة المطعم</title>
	<link rel="icon" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>

    <script src="database.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background: #F8FAFC; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .nav-active { background: rgba(255,255,255,0.1); border-right: 4px solid #F97316; color: #F97316; font-weight: 900; }
        .nav-active i { color: #F97316; }
        .animate-view { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .toast-enter { animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50">
    
    <style>
        #initial-loader { position: fixed; inset: 0; background: #F8FAFC; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s ease; }
        #initial-loader.hidden { opacity: 0; pointer-events: none; }
        .loader-spinner { width: 56px; height: 56px; border: 5px solid #E2E8F0; border-top-color: #EA580C; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <div id="initial-loader">
        <div style="width:56px;height:56px;background:linear-gradient(135deg,#EA580C,#F97316);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 25px rgba(234,88,12,0.35)"><i class="fas fa-utensils text-white text-2xl"></i></div>
        <div class="loader-spinner"></div>
        <p style="margin-top:16px;font-family:system-ui,sans-serif;font-weight:700;color:#64748B;font-size:14px">جاري تحميل نظام المطعم...</p>
    </div>
    <script>
        var loaderEl = document.getElementById("initial-loader");
        document.addEventListener("DOMContentLoaded", function() {
            var root = document.getElementById("root");
            if (!root) return;
            var loaderObserver = new MutationObserver(function() {
                if (root.children.length > 0) {
                    loaderEl.classList.add("hidden");
                    setTimeout(function(){ loaderEl.remove(); }, 500);
                    loaderObserver.disconnect();
                }
            });
            loaderObserver.observe(root, { childList: true });
        });
    </script>
    
    <div id="root"></div>

    <script type="text/babel">
        var { useState, useEffect, useCallback, useRef, useMemo } = React;
        var { liveQuery } = Dexie;

        window.useLiveQuery = function(querier, deps = []) {
            const [value, setValue] = useState(undefined);
            useEffect(() => {
                if(!window.db) return;
                const subscription = liveQuery(querier).subscribe({ next: val => setValue(val), error: err => console.error("DB Error:", err) });
                return () => subscription.unsubscribe();
            }, deps);
            return value;
        };

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center h-screen bg-slate-50 p-6 text-center">
                            <i className="fas fa-exclamation-triangle text-6xl text-rose-500 mb-4"></i>
                            <h2 className="text-2xl font-black text-slate-800">حدث خطأ تقني في الشاشة</h2>
                            <p className="text-slate-500 mt-2 text-sm">{String(this.state.error)}</p>
                            <button onClick={() => window.location.reload()} className="bg-[#EA580C] text-white px-6 py-2 rounded-xl mt-4 font-bold">إعادة المحاولة</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        function Toast({ message, type, onClose }) {
            const colors = type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-500' : 'bg-rose-50 text-rose-700 border-rose-500';
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-times-circle';
            useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); },[]);
            return (
                <div className={`fixed bottom-20 md:bottom-10 left-1/2 -translate-x-1/2 z-[999] toast-enter w-[90%] max-w-sm`}>
                    <div className={`${colors} border-l-4 p-4 rounded-xl shadow-2xl flex items-center gap-3`}><i className={`fas ${icon} text-xl`}></i><p className="font-bold text-sm flex-1">{message}</p></div>
                </div>
            );
        }

        const Menu_Matrix = {
            'main':         { roles: ['owner', 'cashier'], title: 'لوحة التحكم', icon: 'fa-chart-pie', componentName: 'Module_Main' },
            'pos':          { roles: ['owner', 'cashier', 'waiter'], title: 'نقطة البيع (الكاشير)', icon: 'fa-cash-register', componentName: 'Module_POS' },
            'orders':       { roles: ['owner', 'cashier', 'waiter'], title: 'سجل الطلبات', icon: 'fa-receipt', componentName: 'Module_Orders' },
            'menu':         { roles: ['owner'], title: 'إدارة المنيو', icon: 'fa-hamburger', componentName: 'Module_Menu' },
            'tables':       { roles: ['owner', 'cashier'], title: 'إدارة الطاولات', icon: 'fa-chair', componentName: 'Module_Tables' },
            'accounting':   { roles: ['owner', 'cashier'], title: 'الخزينة والحسابات', icon: 'fa-wallet', componentName: 'Module_Accounting' },
            'settings':     { roles: ['owner'], title: 'إعدادات المطعم', icon: 'fa-cog', componentName: 'Module_Settings' },
            'backup':       { roles: ['owner'], title: 'النسخ الاحتياطي', icon: 'fa-database', componentName: 'Module_Backup' }
        };

        const Role_Names = { 'owner': 'مدير المطعم', 'cashier': 'كاشير', 'waiter': 'كابتن صالة / ويتر' };

        function DashboardApp() {
            const [session, setSession] = useState(null);
            const [dbReady, setDbReady] = useState(false);
            const [activeModule, setActiveModule] = useState('main');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [toast, setToast] = useState(null);
            const [isModuleLoading, setIsModuleLoading] = useState(true);
            const [forceRender, setForceRender] = useState(0);

            const showToast = (message, type = 'success') => setToast({ message, type, id: Date.now() });

            // 1. التحقق من الجلسة وتجهيز قاعدة بيانات المطعم
            useEffect(() => {
                const initApp = async () => {
                    const savedSession = localStorage.getItem('MentraRestaurant_Session');
                    if (!savedSession) {
                        window.location.replace('subscriptions.html');
                        return;
                    }
                    
                    const parsedSession = JSON.parse(savedSession);
                    setSession(parsedSession);

                    try {
                        if (parsedSession.dbName) {
                            await window.initRestaurantDB(parsedSession.dbName);
                            setDbReady(true);
                        } else {
                            throw new Error("بيانات الجلسة غير مكتملة");
                        }
                    } catch (error) {
                        console.error("فشل تحميل قاعدة بيانات المطعم", error);
                        localStorage.removeItem('MentraRestaurant_Session');
                        window.location.replace('subscriptions.html');
                    }
                };
                initApp();
            }, []);

            // 2. تحميل الشاشة (ملف JS) بعد التأكد من أن قاعدة البيانات جاهزة
            useEffect(() => {
                if (!dbReady) return; // انتظر حتى تجهز قاعدة البيانات

                const loadActiveModule = async () => {
                    const cfg = Menu_Matrix[activeModule];
                    if (!cfg) return;

                    const compName = cfg.componentName;
                    if (window[compName]) {
                        setIsModuleLoading(false);
                        return;
                    }

                    setIsModuleLoading(true);
                    try {
                        let jsxCode = "";
                        const response = await fetch(`pages/${activeModule}.js`);
                        if (!response.ok) throw new Error("ملف الشاشة غير موجود");
                        jsxCode = await response.text();
                        
                        const compiledCode = Babel.transform(jsxCode, { presets: ['react'] }).code;
                        const script = document.createElement('script');
                        script.type = 'text/javascript';
                        script.text = compiledCode;
                        document.body.appendChild(script);

                        setTimeout(() => {
                            setIsModuleLoading(false);
                            setForceRender(prev => prev + 1);
                        }, 50);

                    } catch (error) {
                        console.error("خطأ في تحميل الشاشة:", error);
                        showToast("تعذر تحميل الشاشة. هل قمت بتشغيل Live Server؟", "error");
                        setIsModuleLoading(false);
                    }
                };

                loadActiveModule();
            }, [activeModule, dbReady]);

            const handleLogout = () => {
                if(confirm("هل أنت متأكد من إغلاق جلسة الكاشير؟")) {
                    localStorage.removeItem('MentraRestaurant_Session');
                    window.location.replace('subscriptions.html');
                }
            };

            // حماية مبدئية: إظهار لودر فارغ حتى يتم قراءة الـ Session
            if (!session) return <div className="h-screen bg-slate-50"></div>;

            const allowedMenus = Object.entries(Menu_Matrix).filter(([id, cfg]) => cfg.roles.includes(session.role));
            const activeComponentName = Menu_Matrix[activeModule]?.componentName;
            const ActiveComponent = window[activeComponentName];

            return (
                <div className="flex h-screen w-full relative bg-slate-50">
                    {toast && <Toast key={toast.id} message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    <div onClick={() => setIsSidebarOpen(false)} className={`fixed inset-0 bg-black/40 backdrop-blur-sm z-[90] md:hidden transition-opacity ${isSidebarOpen ? 'opacity-100 block' : 'opacity-0 hidden'}`}></div>

                    <aside className={`w-72 bg-[#0B1120] text-slate-300 flex flex-col shadow-2xl fixed inset-y-0 right-0 z-[100] transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 border-l border-white/5 ${isSidebarOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="h-20 flex items-center px-6 gap-3 border-b border-slate-800/50">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-[#EA580C] to-[#F97316] flex items-center justify-center text-white shadow-lg"><i className="fas fa-store text-xl"></i></div>
                            <span className="text-white font-black text-2xl tracking-tight">Mentra <span className="text-[#F97316]">Resto</span></span>
                        </div>
                        <nav className="flex-1 py-6 px-4 space-y-2 overflow-y-auto hide-scrollbar">
                            {allowedMenus.map(([id, cfg]) => (
                                <button key={id} onClick={() => { setActiveModule(id); setIsSidebarOpen(false); }} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all duration-200 ${activeModule === id ? 'nav-active bg-white/5' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}>
                                    <i className={`fas ${cfg.icon} w-6 text-center text-xl`}></i>
                                    <span className="text-sm font-bold">{cfg.title}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-5 bg-slate-900/50 border-t border-slate-800/50">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="w-12 h-12 rounded-full bg-[#EA580C] text-white flex items-center justify-center font-black text-xl shadow-inner border border-[#F97316]/30">{session.name.charAt(0)}</div>
                                <div className="flex-1 overflow-hidden">
                                    <p className="text-sm font-black text-white truncate">{session.name}</p>
                                    <p className="text-[11px] text-[#F97316] font-bold tracking-widest mt-0.5">{Role_Names[session.role]}</p>
                                </div>
                            </div>
                            <button onClick={handleLogout} className="w-full py-3 text-rose-400 bg-rose-500/10 rounded-xl font-bold text-sm hover:bg-rose-500 hover:text-white transition-all"><i className="fas fa-sign-out-alt ml-2"></i> إغلاق الوردية</button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col min-w-0">
                        <header className="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-6 z-40 sticky top-0">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(true)} className="md:hidden w-10 h-10 flex items-center justify-center text-slate-600 rounded-xl bg-slate-100 hover:bg-slate-200"><i className="fas fa-bars text-lg"></i></button>
                                <div>
                                    <h2 className="font-black text-[#EA580C] text-xl md:text-2xl">{Menu_Matrix[activeModule]?.title}</h2>
                                    <p className="text-[10px] md:text-xs text-slate-400 font-bold mt-0.5"><i className="fas fa-utensils text-[#F97316] ml-1"></i> {session.restaurant_name}</p>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 relative">
                            <div className="max-w-7xl mx-auto animate-view h-full">
                                {isModuleLoading || !dbReady ? (
                                    <div className="flex flex-col items-center justify-center h-64 text-slate-400">
                                        <i className="fas fa-circle-notch fa-spin text-4xl text-[#F97316] mb-4"></i>
                                        <p className="font-bold">جاري تحميل البيانات...</p>
                                        <p className="text-xs mt-2 opacity-70">إذا استمرت هذه الشاشة، تأكد من تشغيل المشروع عبر Live Server</p>
                                    </div>
                                ) : ActiveComponent ? (
                                    <ActiveComponent restaurantId={session.restaurant_id} userId={session.user_id} showToast={showToast} setActiveModule={setActiveModule} />
                                ) : (
                                    <div className="p-10 text-center bg-white rounded-3xl border border-slate-100 shadow-sm mt-10">
                                        <i className="fas fa-tools text-5xl text-slate-300 mb-4"></i>
                                        <h3 className="text-xl font-bold text-[#EA580C]">عفواً! ملف الشاشة مفقود</h3>
                                        <p className="text-slate-400 mt-2 text-sm">تأكد من وجود ملف <code className="bg-slate-100 px-2 py-1 rounded text-rose-500">{activeModule}.js</code> داخل مجلد <code className="bg-slate-100 px-2 py-1 rounded">pages/</code></p>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-200 flex items-center justify-around z-50 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] pb-safe">
                            <button onClick={() => setActiveModule('main')} className={`flex flex-col items-center gap-1 w-16 ${activeModule === 'main' ? 'text-[#EA580C]' : 'text-slate-400'}`}>
                                <i className="fas fa-home text-xl"></i><span className="text-[9px] font-bold">الرئيسية</span>
                            </button>
                            <button onClick={() => setActiveModule('pos')} className="flex flex-col items-center gap-1 w-16 text-slate-400 relative">
                                <div className={`w-14 h-14 rounded-full flex items-center justify-center -mt-10 shadow-lg border-4 border-slate-50 transition-colors ${activeModule === 'pos' ? 'bg-gradient-to-r from-[#EA580C] to-[#F97316] text-white' : 'bg-slate-800 text-white'}`}>
                                    <i className="fas fa-cash-register text-2xl"></i>
                                </div>
                                <span className={`text-[9px] font-bold mt-1 ${activeModule === 'pos' ? 'text-[#EA580C]' : 'text-slate-400'}`}>الكاشير</span>
                            </button>
                            <button onClick={() => setActiveModule('orders')} className={`flex flex-col items-center gap-1 w-16 ${activeModule === 'orders' ? 'text-[#EA580C]' : 'text-slate-400'}`}>
                                <i className="fas fa-concierge-bell text-xl"></i><span className="text-[9px] font-bold">الطلبات</span>
                            </button>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><DashboardApp /></ErrorBoundary>);
    </script>
</body>
</html>
